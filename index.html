<!DOCTYPE html>

<style>

    background-clip: text;

  .birth-form { background: #14112C; border: 1px solid #2C2756; border-radius: 16px; padding: 26px 22px 22px; }

  .field { display: flex; flex-direction: column; gap: 7px; margin-bottom: 16px; font-size: 13px; color: #C9C2E8; }

    padding: 11px 12px; color: #EDE8DC; font-size: 14px; font-family: inherit;

  .field input:focus { outline: 2px solid #8B7FC7; outline-offset: 1px; }

  .time-picker-row {

  .time-picker-row select {

    border-radius: 9px;

    font-size: 14px;
    font-family: inherit;
    flex: 1;
    min-width: 72px;
  }
  .time-picker-row select:disabled { opacity: 0.4; }
  .time-picker-row span.unit { color: #A79FCB; font-size: 13px; }

  .form-error { color: #E08585; font-size: 12.5px; margin: -6px 0 14px; }
  .submit-btn {

  .chart-wrap { display: flex; justify-content: center; margin: 4px 0 22px; }

  }
  @keyframes fadein { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }

  .cards-grid { display: flex; flex-direction: column; gap: 14px; margin-bottom: 18px; }
  .info-card { background: #14112C; border: 1px solid #2C2756; border-left: 3px solid var(--accent); border-radius: 12px; padding: 18px 18px 16px; }
  .info-card-title { font-size: 12px; letter-spacing: 1px; color: #8B7FC7; margin-bottom: 12px; font-weight: 500; }
  .card-hero { display: flex; align-items: baseline; gap: 12px; margin-bottom: 10px; }
  .hero-hanja { font-family: 'Noto Serif KR', serif; font-size: 30px; font-weight: 700; color: #E8C874; }
  .hero-symbol { font-size: 32px; color: #8B7FC7; }
  .hero-number { font-family: 'Noto Serif KR', serif; font-size: 32px; font-weight: 700; color: #C4A155; }
  .hero-sub { font-size: 13px; color: #B3ABD6; }
  .card-desc { font-size: 13.5px; line-height: 1.7; color: #D3CDEA; margin: 0 0 10px; }

  .reset-btn {

    border: 1px solid #3A3466; color: #A79FCB; border-radius: 20px; font-size: 13px;
    cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
  }
  .reset-btn:hover { border-color: #8B7FC7; color: #C9C2E8; }

  /* ---- 상세풀이 영역 ---- */
  .detail-section-title {

  }

  }
  .detail-card {

  }
  .detail-card-title {

  .detail-card-title .badge {

  }
  .detail-card-title .basis-tag {

  .detail-card-title { flex-wrap: wrap; }
  .detail-card p { font-size: 13.5px; line-height: 1.8; color: #D3CDEA; margin: 0; }
  .year-select-row {

  }
  .year-select-row select {
    background: #0F0C24; border: 1px solid #35306A; border-radius: 8px;
    color: #EDE8DC; padding: 6px 10px; font-size: 13px; font-family: inherit;
  }
  .month-list { display: flex; flex-direction: column; gap: 10px; }
  .month-row {
    background: #0F0C24;
    border: 1px solid #262056;
    border-radius: 10px;
    padding: 12px 14px;
  }
  .month-row-head {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 6px;
    flex-wrap: wrap;
  }
  .month-row-head .month-num {

    font-weight: 700;
    font-size: 14px;

  }
  .month-row-head .ganzhi {
    font-size: 12px;
    color: #8B7FC7;
  }
  .month-row-head .tengod-badge {
    font-size: 10.5px;

    background: #C4A155;
    border-radius: 8px;

  }
  .month-row p { font-size: 12.5px; line-height: 1.7; color: #C9C2E8; margin: 0; }
  .month-subline {
    font-size: 12px;
    line-height: 1.7;
    color: #B3ABD6;
    margin-top: 6px;
  }
  .month-subline b {
    color: #E8C874;
    font-weight: 700;
    margin-right: 5px;
  }
  .month-number-note {
    margin-top: 10px;
    padding: 8px 10px;
    background: #1A1638;
    border-left: 2px solid #8B7FC7;
    border-radius: 4px;
    font-size: 11.5px;
    color: #B3ABD6;

  }

  .job-chip-row { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0 0; }
  .job-chip {
    font-size: 12px;
    color: #EDE8DC;
    background: #1F1A45;
    border: 1px solid #3A3466;

  }
  .subcard-label {
    font-size: 11.5px;
    color: #8B7FC7;
    font-weight: 700;
    margin: 14px 0 4px;

  }

  .element-bar-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }
  .element-bar-label {
    width: 34px;
    font-size: 12.5px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .element-bar-track {
    flex: 1;
    height: 10px;
    background: #0F0C24;
    border-radius: 5px;
    overflow: hidden;
  }
  .element-bar-fill { height: 100%; border-radius: 5px; }
  .element-bar-count {
    width: 18px;
    text-align: right;
    font-size: 12px;
    color: #B3ABD6;
    flex-shrink: 0;
  }
  .strength-badge-row {
    display: flex;
    gap: 8px;
    margin: 14px 0 10px;
    flex-wrap: wrap;
  }
  .strength-badge {
    font-size: 12px;
    font-weight: 700;
    padding: 5px 12px;
    border-radius: 14px;
    background: #1F1A45;
    border: 1px solid #3A3466;
    color: #E8C874;
  }
  .beta-badge {
    display: inline-block;
    font-size: 11px;
    color: #1A1633;
    background: linear-gradient(135deg, #E8C874, #C4A155);
    padding: 3px 10px;
    border-radius: 10px;
    margin: 0 0 14px;
    font-weight: 700;
  }

  /* ---- 후기 남기기 ---- */
  .review-section {
    background: linear-gradient(160deg, #1B1740, #120F28);
    border: 1px solid #3A3466;
    border-radius: 14px;
    padding: 22px 20px;
    margin: 26px 0 18px;
  }
  .review-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 16px;
    font-weight: 700;
    color: #E8C874;
    margin: 0 0 6px;
    text-align: center;
  }
  .review-sub {
    font-size: 12.5px;
    color: #A79FCB;
    text-align: center;
    margin: 0 0 18px;
    line-height: 1.6;
  }
  .star-row {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 16px;
  }
  .star-btn {
    background: none;
    border: none;
    font-size: 30px;
    line-height: 1;
    cursor: pointer;
    color: #3A3466;
    padding: 2px;
    transition: color 0.15s;
  }
  .star-btn.active { color: #E8C874; }
  .status-toggle-row {
    display: flex;
    gap: 8px;
    margin-top: 14px;
  }
  .status-toggle-btn {
    flex: 1;
    background: #0F0C24;
    border: 1px solid #35306A;
    border-radius: 9px;
    padding: 9px 10px;
    color: #A79FCB;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;

  .status-toggle-btn.active {
    background: #2A2456;
    border-color: #8B7FC7;
    color: #EDE8DC;
    font-weight: 700;
  }
  .review-textarea {
    width: 100%;
    min-height: 80px;
    background: #0F0C24;
    border: 1px solid #35306A;
    border-radius: 9px;
    padding: 12px;

    font-size: 13.5px;
    font-family: inherit;

    margin-bottom: 14px;
  }
  .review-textarea:focus { outline: 2px solid #8B7FC7; outline-offset: 1px; }
  .review-consent {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    font-size: 12px;
    color: #A79FCB;
    line-height: 1.6;
    margin-bottom: 16px;
  }
  .review-consent input { margin-top: 2px; width: 15px; height: 15px; flex-shrink: 0; }
  .review-submit-btn {
    width: 100%;
    padding: 12px;
    border-radius: 9px;
    border: none;
    background: linear-gradient(135deg, #E8C874, #C4A155);
    color: #1A1633;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .review-submit-btn:hover { filter: brightness(1.06); }
  .review-submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .review-error { color: #E08585; font-size: 12px; margin: -8px 0 12px; text-align: center; }
  .review-thanks {
    text-align: center;
    padding: 10px 0;
  }
  .review-thanks .icon { font-size: 30px; margin-bottom: 8px; }
  .review-thanks .msg { font-size: 14px; color: #F3E9D2; font-weight: 700; margin-bottom: 4px; }
  .review-thanks .sub { font-size: 12.5px; color: #A79FCB; }

</head>
<body>
<div id="root"></div>
<script>
(function () {
  "use strict";

  /* ============================================================
     삼원반 (三元盤) — 사주 + 서양 점성술 + 수비학 (순수 JS, 무의존성)
     ============================================================ */

  var STEM_KO = ["갑", "을", "병", "정", "무", "기", "경", "신", "임", "계"];
  var STEM_HANJA = ["甲", "乙", "丙", "丁", "戊", "己", "庚", "辛", "壬", "癸"];
  var STEM_ELEMENT = ["목", "목", "화", "화", "토", "토", "금", "금", "수", "수"];

  var BRANCH_KO = ["자", "축", "인", "묘", "진", "사", "오", "미", "신", "유", "술", "해"];
  var BRANCH_HANJA = ["子", "丑", "寅", "卯", "辰", "巳", "午", "未", "申", "酉", "戌", "亥"];
  var BRANCH_ELEMENT = ["수", "토", "목", "목", "토", "화", "화", "토", "금", "금", "토", "수"];
  var BRANCH_ANIMAL = ["쥐", "소", "호랑이", "토끼", "용", "뱀", "말", "양", "원숭이", "닭", "개", "돼지"];

  var ELEMENT_COLOR = { 목: "#5B8C5A", 화: "#A23B3B", 토: "#B8935A", 금: "#ABA394", 수: "#4A6FA5" };
  var ELEMENT_NAME_FULL = { 목: "목(木)", 화: "화(火)", 토: "토(土)", 금: "금(金)", 수: "수(水)" };

  var ELEMENT_PERSONA = {
    목: "목(木)은 오행 중 생장(生長)을 관장하는 기운으로, 위로 곧게 뻗어나가려는 방향성과 시작을 여는 추진력을 본질로 합니다. 사고의 확장과 계획 수립에 강점을 보이나, 유연성이 부족할 경우 완고함으로 발현될 수 있습니다.",
    화: "화(火)는 오행 중 발산(發散)을 관장하는 기운으로, 안에 있는 것을 밖으로 드러내고 확산시키는 성질을 본질로 합니다. 표현력과 순발력이 뛰어나나, 조절되지 않으면 기운이 쉽게 소진되는 경향이 있습니다.",
    토: "토(土)는 오행 중 중재(仲裁)와 저장(貯藏)을 관장하는 기운으로, 서로 다른 기운을 품고 중심을 잡아 지속시키는 성질을 본질로 합니다. 신뢰와 지구력이 강점이나, 변화에 대한 반응이 더딜 수 있습니다.",
    금: "금(金)은 오행 중 숙살(肅殺)과 결단(決斷)을 관장하는 기운으로, 불필요한 것을 쳐내고 결과를 정확히 마무리하는 성질을 본질로 합니다. 원칙과 완결성에 강점을 보이나, 지나치면 냉정함으로 비칠 수 있습니다.",
    수: "수(水)는 오행 중 응축(凝縮)과 지혜(智慧)를 관장하는 기운으로, 낮은 곳으로 스며들어 상황에 맞춰 형태를 바꾸는 성질을 본질로 합니다. 사유와 적응력이 강점이나, 방향성이 흐트러지면 우유부단함으로 나타날 수 있습니다."
  };

  var ZODIAC = [
    ["염소자리", "♑", "흙", 12, 22, 1, 19],
    ["물병자리", "♒", "공기", 1, 20, 2, 18],
    ["물고기자리", "♓", "물", 2, 19, 3, 20],
    ["양자리", "♈", "불", 3, 21, 4, 19],
    ["황소자리", "♉", "흙", 4, 20, 5, 20],
    ["쌍둥이자리", "♊", "공기", 5, 21, 6, 21],
    ["게자리", "♋", "물", 6, 22, 7, 22],
    ["사자자리", "♌", "불", 7, 23, 8, 22],
    ["처녀자리", "♍", "흙", 8, 23, 9, 22],
    ["천칭자리", "♎", "공기", 9, 23, 10, 22],
    ["전갈자리", "♏", "물", 10, 23, 11, 21],
    ["사수자리", "♐", "불", 11, 22, 12, 21]
  ];

  var ZODIAC_ELEMENT_KO = { 불: "화", 흙: "토", 공기: "금", 물: "수" };

  var ZODIAC_ORDER_FROM_ARIES = [
    "양자리", "황소자리", "쌍둥이자리", "게자리", "사자자리", "처녀자리",
    "천칭자리", "전갈자리", "사수자리", "염소자리", "물병자리", "물고기자리"
  ];

  var ZODIAC_SYMBOL = {};
  ZODIAC.forEach(function (z) { ZODIAC_SYMBOL[z[0]] = z[1]; });

  var ZODIAC_PERSONA = {
    양자리: "화성(Mars)이 지배하는 활동궁(活動宮)으로, 목표를 인지하는 즉시 행동으로 옮기는 개척자적 추진력이 본질입니다. 시작하는 능력은 탁월하나 지속성에서는 별도의 관리가 필요합니다.",

    return { top1: top1, top2: top2, isDual: isDual };
  }

  function getDayMasterStrength(dayElement, yearP, monthP, dayP, hourP) {
    // 월지(月支)에 2배 가중치를 두어 판단하는 간이 신강/신약 판정
    var supportElements = { 목: 0, 화: 0, 토: 0, 금: 0, 수: 0 }; // 자기 자신 표시용, 아래서 판별
    var slots = [
      { el: STEM_ELEMENT[yearP.stemIdx], w: 1 },
      { el: BRANCH_ELEMENT[yearP.branchIdx], w: 1 },
      { el: STEM_ELEMENT[monthP.stemIdx], w: 1 },
      { el: BRANCH_ELEMENT[monthP.branchIdx], w: 2 }, // 월지 가중치 2배
      { el: BRANCH_ELEMENT[dayP.branchIdx], w: 1 }
    ];
    if (hourP) {
      slots.push({ el: STEM_ELEMENT[hourP.stemIdx], w: 1 });
      slots.push({ el: BRANCH_ELEMENT[hourP.branchIdx], w: 1 });
    }
    var supportWeight = 0, totalWeight = 0;
    var generatorOfDay = REVERSE_GENERATES[dayElement];
    slots.forEach(function (s) {
      totalWeight += s.w;
      if (s.el === dayElement || s.el === generatorOfDay) supportWeight += s.w;
    });
    var strength = supportWeight >= totalWeight / 2 ? "신강" : "신약";
    return { strength: strength, supportWeight: supportWeight, totalWeight: totalWeight };
  }

  function polygonPoints(cx, cy, r, n, rotateDeg) {
    if (rotateDeg === undefined) rotateDeg = -90;
    var pts = [];
    var sides = Math.max(3, Math.min(n, 40));
    for (var i = 0; i < sides; i++) {
      var angle = ((360 / sides) * i + rotateDeg) * (Math.PI / 180);
      pts.push((cx + r * Math.cos(angle)) + "," + (cy + r * Math.sin(angle)));
    }
    return pts.join(" ");
  }

    // 뚜렷한 신살이 있어도(예: 화개=예술가·학자) 5자리가 이미 차 버려 반영되지 못하는

      '<div class="detail-card" style="--accent:#C4A155">' +
        '<div class="detail-card-title">직업운 <span class="basis-tag">사주 중심 · 수비학 보조</span></div><p>' + careerText + '</p>' +
        '<div class="subcard-label">가장 적합한 직업 다섯 가지 <span style="font-weight:400; color:#8B849E; font-size:11.5px;">(오행·월지 십성·신살·생명수 종합)</span></div>' +
        '<div class="job-chip-row">' + jobChips + '</div>' +
        '<div class="subcard-label">국내 vs 해외 <span style="font-weight:400; color:#8B849E; font-size:11.5px;">(역마살 기준, 사주 근거)</span></div><p>' + overseasText + '</p>' +
        '<div class="subcard-label">계약·시험 앞두고 있다면</div><p>' + contractExamTip + '</p>' +
      '</div>' +

      '<div class="detail-card" style="--accent:#8B7FC7">' +
        '<div class="detail-card-title">인간관계운 <span class="basis-tag">사주 중심 · 점성술·수비학 보조</span></div><p>' + relationshipText + '</p>' +
        '<div class="subcard-label">지금 상태에 맞는 관계 · 귀인 풀이</div>' +
        '<div class="status-toggle-row">' +
          '<button type="button" class="status-toggle-btn active" data-status="married">기혼이라면</button>' +
          '<button type="button" class="status-toggle-btn" data-status="unmarried">미혼이라면</button>' +
        '</div>' +
        '<div id="maritalRelWrap">' + statusBlocks.married + '</div>' +
      '</div>' +

      '<div class="detail-card" style="--accent:#A23B3B">' +
        '<div class="detail-card-title">배우자운 <span class="basis-tag">사주 중심 · 점성술·수비학 보조</span></div><p>' + spouseBaseText + '</p>' +
        (spouseTenGodText ? '<div class="subcard-label">배우자궁(일지) 십성으로 본 관계 성향</div><p>' + spouseTenGodText + '</p>' : '') +
        '<div class="subcard-label">생명수로 보는 결혼생활</div><p>' + spouseLifePathText + '</p>' +
        '<div class="subcard-label">별자리로 보는 결혼생활</div><p>' + spouseZodiacText + '</p>' +
        '<p style="margin-top:10px; font-size:12.5px; color:#A79FCB;">' + SPOUSE_SYNASTRY_NOTE + '</p>' +
      '</div>' +

      '<div class="detail-card" style="--accent:' + ELEMENT_COLOR[healthProfile.deficient] + '">' +
        '<div class="detail-card-title">건강운 <span class="basis-tag">사주 중심 · 점성술·수비학 보조</span></div><p>' + healthText + '</p>' +
        '<div class="subcard-label">' + chart.zodiac.name + ' 참고</div><p>' + healthZodiacText + '</p>' +
        '<div class="subcard-label">생명수 ' + chart.lifePath + ' 참고</div><p>' + healthLifePathText + '</p>' +
        '<p style="margin-top:10px; font-size:12px; color:#8B849E;">이 콘텐츠는 전통 명리·점성술 이론에 근거한 참고용 정보이며, 의학적 진단이나 치료를 대체하지 않습니다. 건강 이상이 의심되면 반드시 전문의와 상담하세요.</p>' +
      '</div>' +

      '<div class="detail-card" style="--accent:#4A6FA5">' +
        '<div class="detail-card-title">참고 · 별자리 &amp; 생명수</div>' +
        '<p>사주 오행 분석이 이 풀이의 중심이며, 별자리와 생명수는 그 안에서 드러나지 않는 결을 보완하는 참고 지표입니다.</p>' +
        '<div class="subcard-label">' + chart.zodiac.name + ' (' + chart.zodiac.symbol + ')</div>' +
        '<p>핵심 기질: ' + ZODIAC_KEYWORD[chart.zodiac.name] + '</p>' +
        '<div class="subcard-label">생명수 ' + chart.lifePath + '</div>' +
        '<p>핵심 테마: ' + LIFE_PATH_KEYWORD[chart.lifePath] + '</p>' +
      '</div>' +

      '<div id="yearlyCardWrap">' + monthlyForecastHTML(chart, selectedYear) + '</div>';
  }

  function detailSectionHTML(chart, selectedYear) {
    return '<div class="detail-section-title">상세 풀이</div>' +
      '<p class="detail-section-sub">사주 오행 분석 · 재물운 · 직업운(계약·시험 포함) · 인간관계운 · 배우자운 · 건강운 · 세운(歲運) 월별 분석</p>' +
      unlockedDetailHTML(chart, selectedYear);
  }

  function wireDetailEvents(chart) {
    var yearSelect = document.getElementById("yearSelect");
    if (yearSelect) {
      yearSelect.addEventListener("change", function () {
        var y = Number(yearSelect.value);
        document.getElementById("yearlyCardWrap").innerHTML = monthlyForecastHTML(chart, y);
        wireDetailEvents(chart); // re-wire new select element
      });
    }

    var statusBtns = Array.prototype.slice.call(document.querySelectorAll(".status-toggle-btn"));
    if (statusBtns.length) {
      var statusBlocks = relationshipStatusBlocks(chart);
      statusBtns.forEach(function (btn) {
        btn.addEventListener("click", function () {
          statusBtns.forEach(function (b) { b.classList.remove("active"); });
          btn.classList.add("active");
          var wrap = document.getElementById("maritalRelWrap");
          wrap.innerHTML = btn.dataset.status === "married" ? statusBlocks.married : statusBlocks.unmarried;
        });
      });
    }
  }

  /* ---------- 후기 남기기 ---------- */

  function hasReviewed() {
    try { return localStorage.getItem("samwonban_reviewed") === "true"; } catch (e) { return false; }
  }

  function reviewThanksHTML() {
    return '<div class="review-thanks">' +
      '<div class="icon">🙏</div>' +
      '<div class="msg">소중한 후기 감사합니다!</div>' +
      '<div class="sub">남겨주신 이야기, 잘 참고할게요.</div>' +
    '</div>';
  }

  function reviewFormHTML() {
    var stars = "";
    for (var i = 1; i <= 5; i++) {
      stars += '<button type="button" class="star-btn" data-star="' + i + '">★</button>';
    }
    return '<div class="star-row" id="starRow">' + stars + '</div>' +
      '<textarea class="review-textarea" id="reviewText" placeholder="느낀 점을 자유롭게 남겨주세요"></textarea>' +
      '<label class="review-consent">' +
        '<input type="checkbox" id="reviewConsent">' +
        '<span>이 후기가 마케팅(릴스, SNS 등)에 활용되는 것에 동의합니다</span>' +
      '</label>' +
      '<div class="review-error" id="reviewError" style="display:none;"></div>' +
      '<button class="review-submit-btn" id="reviewSubmitBtn">후기 남기기</button>';
  }

  function reviewSectionHTML() {
    var already = hasReviewed();
    return '<div class="review-section" id="reviewSection">' +
      '<div class="review-title">이 결과, 어떠셨나요?</div>' +
      '<div class="review-sub">복채는 후기로 남겨주세요. 좋은 일이 생깁니다. 😊</div>' +
      '<div id="reviewBody">' + (already ? reviewThanksHTML() : reviewFormHTML()) + '</div>' +
    '</div>';
  }

  function wireReviewEvents(chart) {
    if (hasReviewed()) return;

    var selectedRating = 0;
    var starRow = document.getElementById("starRow");
    var starBtns = starRow ? Array.prototype.slice.call(starRow.querySelectorAll(".star-btn")) : [];

    function paintStars() {
      starBtns.forEach(function (btn) {
        var v = Number(btn.getAttribute("data-star"));
        if (v <= selectedRating) btn.classList.add("active");
        else btn.classList.remove("active");
      });
    }

    starBtns.forEach(function (btn) {
      btn.addEventListener("click", function () {
        selectedRating = Number(btn.getAttribute("data-star"));
        paintStars();
      });
    });

    var submitBtn = document.getElementById("reviewSubmitBtn");
    if (!submitBtn) return;

    submitBtn.addEventListener("click", function () {
      var errorEl = document.getElementById("reviewError");
      var consentBox = document.getElementById("reviewConsent");
      var textEl = document.getElementById("reviewText");

      if (selectedRating === 0) {
        errorEl.textContent = "별점을 먼저 선택해주세요.";
        errorEl.style.display = "block";
        return;
      }
      if (!consentBox.checked) {
        errorEl.textContent = "마케팅 활용 동의 체크가 필요합니다.";
        errorEl.style.display = "block";
        return;
      }
      errorEl.style.display = "none";
      submitBtn.disabled = true;
      submitBtn.textContent = "전송 중...";

      var payload = {
        rating: selectedRating,
        review: textEl.value.slice(0, 1000),
        consent: true,
        zodiac: chart.zodiac.name,
        dayElement: chart.dayElement,
        lifePath: chart.lifePath
      };

      // Apps Script 웹 앱은 CORS 응답을 지원하지 않아 no-cors 로 전송 (응답 내용은 읽지 않고 낙관적으로 처리)
      try {
        fetch(CONFIG.REVIEW_ENDPOINT_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify(payload)
        }).catch(function () {});
      } catch (e) { /* 네트워크 미지원 환경이어도 아래 완료 처리는 진행 */ }

      try { localStorage.setItem("samwonban_reviewed", "true"); } catch (e) {}

      setTimeout(function () {
        var body = document.getElementById("reviewBody");
        if (body) body.innerHTML = reviewThanksHTML();
      }, 400);
    });
  }

  /* ---------- 화면 렌더링 ---------- */

  var root = document.getElementById("root");

  function renderHeader() {
    return '<div class="header">' +
      '<div class="eyebrow">SAJU · ASTROLOGY · NUMEROLOGY</div>' +
      '<h1>三元盤 삼원반</h1>' +
      '<p>사주 · 서양 점성술 · 수비학, 세 개의 원(元)이 만나는 자리</p>' +
    '</div>';
  }

  function buildDateSelectOptions() {
    var thisYear = new Date().getFullYear();
    var year = '<option value="">년</option>';
    for (var y = thisYear; y >= 1900; y--) {
      year += '<option value="' + y + '">' + y + '년</option>';
    }
    var month = '<option value="">월</option>';
    for (var m = 1; m <= 12; m++) month += '<option value="' + m + '">' + m + '월</option>';
    var day = '<option value="">일</option>';
    for (var d = 1; d <= 31; d++) day += '<option value="' + d + '">' + d + '일</option>';
    return { year: year, month: month, day: day };
  }

  function buildTimeSelectOptions() {
    var ampm = '<option value="">선택</option><option value="AM">오전</option><option value="PM">오후</option>';
    var hour = '<option value="">시</option>';
    for (var h = 1; h <= 12; h++) hour += '<option value="' + h + '">' + h + '시</option>';
    var minute = '<option value="">분</option>';
    for (var mi = 0; mi <= 59; mi++) {
      var mm = mi < 10 ? "0" + mi : String(mi);
      minute += '<option value="' + mi + '">' + mm + '분</option>';
    }
    return { ampm: ampm, hour: hour, minute: minute };
  }

  function to24Hour(ampm, hour12) {
    var h = Number(hour12);
    if (ampm === "AM") return h === 12 ? 0 : h;
    return h === 12 ? 12 : h + 12;
  }

  function renderForm() {
    var opts = buildTimeSelectOptions();
    var dateOpts = buildDateSelectOptions();
    root.innerHTML = '<div class="app-root"><div class="content-wrap">' +
      renderHeader() +
      '<form class="birth-form" id="birthForm">' +
        '<p class="form-lede">생년월일(양력)을 입력하면 사주 · 별자리 · 생명수 세 갈래로 명반을 펼칩니다.</p>' +
        '<div class="field"><span>생년월일 (양력)</span>' +
          '<div class="time-picker-row">' +
            '<select id="birthYear">' + dateOpts.year + '</select>' +
            '<select id="birthMonth">' + dateOpts.month + '</select>' +
            '<select id="birthDay">' + dateOpts.day + '</select>' +
          '</div>' +
          '<span style="font-size:11.5px; color:#8B849E;">각 항목 클릭 후 연도 숫자를 바로 타이핑하면 빠르게 찾을 수 있어요 (예: 1975 입력)</span>' +
        '</div>' +
        '<div class="field"><span>출생시간 (선택 · 시주 계산에 사용)</span>' +
          '<div class="time-picker-row">' +
            '<select id="birthAmPm">' + opts.ampm + '</select>' +
            '<select id="birthHour">' + opts.hour + '</select>' +
            '<select id="birthMinute">' + opts.minute + '</select>' +
          '</div>' +
        '</div>' +
        '<label class="checkbox-field"><input type="checkbox" id="unknownTime"><span>출생시간을 모릅니다</span></label>' +
        '<div class="form-error" id="formError" style="display:none;"></div>' +
        '<button type="submit" class="submit-btn">명반 펼치기</button>' +
      '</form>' +
    '</div></div>';

    var form = document.getElementById("birthForm");
    var unknownTimeBox = document.getElementById("unknownTime");
    var ampmSel = document.getElementById("birthAmPm");
    var hourSel = document.getElementById("birthHour");
    var minuteSel = document.getElementById("birthMinute");

    unknownTimeBox.addEventListener("change", function () {
      var disabled = unknownTimeBox.checked;
      ampmSel.disabled = disabled;
      hourSel.disabled = disabled;
      minuteSel.disabled = disabled;
    });

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      var yVal = document.getElementById("birthYear").value;
      var mVal = document.getElementById("birthMonth").value;
      var dVal = document.getElementById("birthDay").value;
      var errorEl = document.getElementById("formError");
      if (!yVal || !mVal || !dVal) {
        errorEl.textContent = "생년월일을 년·월·일까지 모두 선택해주세요.";
        errorEl.style.display = "block";
        return;
      }
      var y = Number(yVal), m = Number(mVal), d = Number(dVal);
      if (!y || y < 1900 || y > 2100) {
        errorEl.textContent = "1900~2100년 사이의 날짜를 입력해주세요.";
        errorEl.style.display = "block";
        return;
      }

      var hour = 12, minute = 0, hasTime = false;
      if (!unknownTimeBox.checked) {
        var ampmVal = ampmSel.value, hourVal = hourSel.value, minuteVal = minuteSel.value;
        if (ampmVal === "" || hourVal === "" || minuteVal === "") {
          errorEl.textContent = "출생시간을 오전/오후·시·분까지 모두 선택하거나, 모르신다면 아래 체크박스를 선택해주세요.";
          errorEl.style.display = "block";
          return;
        }
        hour = to24Hour(ampmVal, hourVal);
        minute = Number(minuteVal);
        hasTime = true;
      }
      errorEl.style.display = "none";

      var input = { year: y, month: m, day: d, hour: hour, minute: minute, hasTime: hasTime };
      var chart = computeChart(input);
      renderResult(chart);
    });
  }

  function renderResult(chart) {
    var thisYear = new Date().getFullYear();
    root.innerHTML = '<div class="app-root"><div class="content-wrap">' +
      renderHeader() +
      '<div class="chart-wrap">' + destinyChartSVG(chart) + '</div>' +
      resultCardsHTML(chart) +
      synthesisHTML(chart) +
      '<p class="disclaimer">간단 버전으로 절기(節氣) 및 진태양시 보정이 반영되지 않은 근사 계산입니다. 재미로 참고해주세요.</p>' +
      '<div id="detailSection">' + detailSectionHTML(chart, thisYear) + '</div>' +
      reviewSectionHTML() +
      '<button class="reset-btn" id="resetBtn">다시 보기</button>' +
    '</div></div>';

    document.getElementById("resetBtn").addEventListener("click", renderForm);
    wireDetailEvents(chart);
    wireReviewEvents(chart);
  }

  renderForm();
})();
</script>
</body>
</html>
